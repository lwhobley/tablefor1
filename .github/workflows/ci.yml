name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  app:
    name: Typecheck, lint, and unit test the app
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test

  edge-functions:
    name: Typecheck and unit test edge functions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: deno check
        run: |
          for f in supabase/functions/*/index.ts; do
            echo "Checking $f"
            deno check --config supabase/functions/deno.json "$f"
          done
      - name: deno test
        run: deno test --config supabase/functions/deno.json supabase/functions
